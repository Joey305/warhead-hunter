{% extends "base.html" %}
{% block content %}

<div class="container" style="padding: 20px;">
    <h1 style="color: var(--tron-blue); text-shadow: 0 0 10px var(--tron-blue);">
        TARGET STRUCTURE: <span style="color: white;">{{ file_url.split('/')[-1] }}</span>
    </h1>

    <div id="viewer" style="
        width: 100%;
        height: 600px;
        background-color: #000;
        border: 2px solid var(--tron-yellow);
        border-radius: 10px;
        box-shadow: 0 0 15px var(--tron-yellow);
        position: relative;
    "></div>

    <div style="margin-top: 10px; text-align: right;">
        <span style="color: #00FFFF;">■ Protein</span> &nbsp; 
        <span style="color: #FFA500;">■ Ligand (Warhead)</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.5/3Dmol-min.js"></script>

<script>
    const pdb_url = "{{ file_url }}";

    $(function() {
        let element = $("#viewer");
        let config = { backgroundColor: "black" };
        let viewer = $3Dmol.createViewer(element, config);

        $3Dmol.download(pdb_url, viewer, {}, function() {
            
            // 1. Clear Default Styles
            viewer.setStyle({}, {});

            // 2. Style the Protein (The Target) -> Neon Cyan Cartoon
            viewer.addStyle({hetflag: false}, {
                cartoon: {color: '#00FFFF', opacity: 0.8},
                // Optional: Add faint wireframe for "Tech" look
                // line: {color: '#008888', opacity: 0.3} 
            });

            // 3. Style the Ligand (The Warhead) -> Neon Orange Sticks
            viewer.addStyle({hetflag: true}, {
                stick: {colorscheme: 'orangeCarbon', radius: 0.3},
                sphere: {scale: 0.3, color: '#FFA500'}
            });

            // 4. Camera Setup
            viewer.zoomTo();
            viewer.render();
            
            // 5. Auto-Spin (The "Screensaver" effect)
            // viewer.spin("y", 0.5); 
        });
    });
</script>

{% endblock %}
