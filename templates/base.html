<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/Target-favicon.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/Target-favicon.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/nav.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/tron.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    {% block page_css %}{% endblock %}

    <title>PROTAC Target Module</title>
</head>

<body class="platform-body">

    <div class="platform-bg" aria-hidden="true">
        <div class="platform-bg-orb platform-bg-orb-a"></div>
        <div class="platform-bg-orb platform-bg-orb-b"></div>
        <div class="platform-bg-grid"></div>
    </div>

    {% include "nav.html" %}

    <div class="platform-shell">
        <main class="platform-main">
            {% block content %}{% endblock %}
        </main>

        {% include "footer.html" %}
    </div>



    <div id="tronLoader" class="tron-loading-overlay">
        <div class="tron-spinner"></div>
    </div>
    
    <script>
    function showLoader() {
        document.getElementById("tronLoader").style.display = "flex";
    }
    </script>

    <script>
    window.addEventListener('scroll', () => {
        if (window.scrollY > 10) {
            document.body.classList.add('scrolled');
        } else {
            document.body.classList.remove('scrolled');
        }
    });
    </script>
    {% block page_js %}{% endblock %}


</body>
</html>
